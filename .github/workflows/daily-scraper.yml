name: 文物数字化中标信息日报

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: '搜索关键词(逗号分隔,留空则用20个默认关键词)'
        required: false
        default: ''
      days:
        description: '爬取天数(生产模式1天,开发可调)'
        required: false
        default: '1'
      collect_time:
        description: '收集时间(北京时间 HH:MM,留空=立即)'
        required: false
        default: ''
      push_time:
        description: '推送时间(北京时间 HH:MM,留空=立即)'
        required: false
        default: ''
  schedule:
    # === 测试配置: 每2小时运行一次，方便验证修复效果 ===
    # 测试完成后请改回下方生产配置
    #- cron: '0 */2 * * *'
    # === 测试配置: 每半小时运行一次，方便验证修复效果 ===
    # 测试完成后请改回下方生产配置
    #- cron: '*/30 * * * *'
    # === 生产配置: 北京时间 00:00 = UTC 16:00 ===
    # - cron: '0 16 * * *'
    # === 生产配置: 北京时间 06:00 = UTC 22:00 ===
    # - cron: '0 22 * * *'
    # === 生产配置: 北京时间 12:00 = UTC 04:00 ===
    - cron: '0 4 * * *'
    # === 生产配置: 北京时间 18:00 = UTC 10:00 ===
    # - cron: '0 10 * * *'
    # === 生产配置: 北京时间 9:10 = UTC 1:10 ===
    # - cron: '10 1 * * *'

jobs:
  collect:
    name: 爬取+AI总结
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 等待到指定时间(仅手动触发)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.collect_time != ''
        run: |
          echo "目标时间(北京): ${{ github.event.inputs.collect_time }}"
          target_utc=$(TZ='Asia/Shanghai' date -d "${{ github.event.inputs.collect_time }}" +%s 2>/dev/null || echo 0)
          now_utc=$(date +%s)
          wait_sec=$((target_utc - now_utc))
          if [ $wait_sec -gt 0 ] && [ $wait_sec -lt 21600 ]; then
            echo "等待 ${wait_sec}s..."
            sleep $wait_sec
          elif [ $wait_sec -ge 21600 ]; then
            echo "⚠️ 延迟超过6h, GitHub Actions会超时, 跳过等待"
          else
            echo "目标时间已过, 立即执行"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: 设置日期
        id: dt
        run: echo "today=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 下载上周数据artifact
        uses: actions/download-artifact@v4
        with:
          name: week-data
          path: week_cache/
        continue-on-error: true

      - name: 爬取中标信息
        env:
          KEYWORD_INPUT: ${{ github.event.inputs.keyword }}
          DAYS_INPUT: ${{ github.event.inputs.days }}
        run: python ccgp_fast_scraper.py -k "${KEYWORD_INPUT}" -d "${DAYS_INPUT:-5}" -o "output/${{ steps.dt.outputs.today }}/文物数字化"

      - name: 下载附件
        run: python download_attachments.py --date ${{ steps.dt.outputs.today }}

      - name: AI总结(模板1+2跳过模板3)
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python ai_summarize.py --date ${{ steps.dt.outputs.today }} --skip-trend

      - name: 周状态管理
        id: week
        run: |
          if [ -d "output/${{ steps.dt.outputs.today }}" ]; then
            mkdir -p week_cache/output
            cp -r "output/${{ steps.dt.outputs.today }}" "week_cache/output/"
          fi
          python week_manager.py add "${{ steps.dt.outputs.today }}" --data-dir week_cache

      - name: 第7天合并CSV加行业趋势
        if: contains(steps.week.outputs.day7, 'True')
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python week_manager.py trend "${{ steps.dt.outputs.today }}" --data-dir week_cache

      - name: 上传本周数据artifact
        uses: actions/upload-artifact@v4
        with:
          name: week-data
          path: week_cache/
          retention-days: 8

  push:
    name: 飞书推送
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 等待到指定时间(仅手动触发)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.push_time != ''
        run: |
          echo "目标时间(北京): ${{ github.event.inputs.push_time }}"
          target_utc=$(TZ='Asia/Shanghai' date -d "${{ github.event.inputs.push_time }}" +%s 2>/dev/null || echo 0)
          now_utc=$(date +%s)
          wait_sec=$((target_utc - now_utc))
          if [ $wait_sec -gt 0 ] && [ $wait_sec -lt 21600 ]; then
            echo "等待 ${wait_sec}s..."
            sleep $wait_sec
          elif [ $wait_sec -ge 21600 ]; then
            echo "⚠️ 延迟超过6h, GitHub Actions会超时, 跳过等待"
          else
            echo "目标时间已过, 立即执行"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 设置日期
        id: dt
        run: echo "today=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 下载本周数据artifact
        uses: actions/download-artifact@v4
        with:
          name: week-data
          path: week_cache/
        continue-on-error: true

      - name: 飞书推送
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python feishu_push.py --date ${{ steps.dt.outputs.today }}
